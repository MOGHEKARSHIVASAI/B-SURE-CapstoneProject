spring.application.name=Binsure
spring.application.display-name=Business Insurance Management System

server.port=8050


# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/binsurance_db
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=10


# H2 Console (disabled)
spring.h2.console.enabled=false


logging.level.root=INFO
logging.level.org.hartford.binsure=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/binsure.log

# JWT Configuration
app.jwtSecret=mySecretKeyForJWTTokenGenerationAndValidationPurposeLongEnoughForHS512Algorithm
app.jwtExpirationMs=86400000

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayOperationId=true
springdoc.swagger-ui.doc-expansion=list



# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# Application-specific Configuration
app.name=BIMS
app.description=Business Insurance Management System
app.version=1.0.0
